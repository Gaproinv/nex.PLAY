<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Profesional - Control de Voz & Configuración de Sala</title>
    <style>
        :root {
            --bg-dark: #111216;
            --panel-bg: #1f2026;
            --panel-border: #3a3b45;
            --roblox-green: #00e676;
            --roblox-red: #ff3b30;
            --roblox-muted: #45474f;
            --ui-blue-gradient: linear-gradient(180deg, #5dade2 0%, #2471a3 100%);
            --ui-blue-dark: #1b4f72;
            --ui-blue-shadow: #154360;
        }

        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: var(--bg-dark);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #e3e4e8;
        }

        /* --- SISTEMA DE INTERFAZ DE USUARIO (MENÚ PRINCIPAL) --- */
        .menu-card {
            position: absolute;
            width: 360px;
            background: var(--ui-blue-gradient);
            border: 4px solid var(--ui-blue-dark);
            border-radius: 28px;
            padding: 25px;
            box-shadow: 0 12px 0px #114162, 0 20px 40px rgba(0,0,0,0.6);
            text-align: center;
            z-index: 100;
            box-sizing: border-box;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.1), opacity 0.3s ease;
        }

        .hidden {
            display: none !important;
        }

        .menu-header {
            background-color: var(--ui-blue-dark);
            color: white;
            font-weight: 800;
            padding: 12px;
            border-radius: 14px;
            margin-bottom: 20px;
            font-size: 16px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        .menu-btn {
            background: white;
            color: var(--ui-blue-dark);
            font-size: 16px;
            font-weight: 700;
            padding: 14px 0;
            width: 100%;
            margin: 10px 0;
            border: 3px solid var(--ui-blue-dark);
            border-radius: 16px;
            cursor: pointer;
            box-shadow: 0 6px 0px var(--ui-blue-shadow);
            transition: transform 0.1s ease, box-shadow 0.1s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            box-sizing: border-box;
        }

        .menu-btn:hover { background-color: #f8f9f9; }
        .menu-btn:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0px var(--ui-blue-shadow);
        }

        .ui-input {
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            border: 3px solid var(--ui-blue-dark);
            font-size: 16px;
            font-weight: 600;
            text-align: center;
            margin-bottom: 12px;
            box-sizing: border-box;
        }

        .room-code-display {
            background: #111216;
            color: #fff;
            font-size: 24px;
            font-weight: 800;
            letter-spacing: 4px;
            padding: 15px;
            border-radius: 12px;
            margin: 15px 0;
            border: 2px dashed #fff;
        }

        /* --- EDITOR DE PERSONAJE POR PIXELES --- */
        .customizer-group {
            display: flex;
            justify-content: space-around;
            margin: 15px 0;
            background: rgba(0,0,0,0.2);
            padding: 10px;
            border-radius: 14px;
        }

        .color-picker-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            font-size: 12px;
            font-weight: bold;
            color: white;
        }

        .color-picker-wrapper input[type="color"] {
            border: 2px solid var(--ui-blue-dark);
            border-radius: 8px;
            width: 40px;
            height: 40px;
            cursor: pointer;
            background: none;
            margin-top: 5px;
        }

        /* --- ESPACIO DE TRABAJO EN DIRECTO --- */
        #workspace {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.5s ease, transform 0.5s ease;
            pointer-events: none;
        }

        #workspace.active {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
        }

        .voice-avatar-frame {
            position: relative;
            width: 260px;
            height: 260px;
            border-radius: 50%;
            background: #2a2b30;
            border: 6px solid var(--roblox-muted); 
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            transition: border-color 0.2s cubic-bezier(0.1, 0.8, 0.2, 1), box-shadow 0.2s ease;
        }

        .voice-avatar-frame.talking {
            border-color: var(--roblox-green);
            box-shadow: 0 0 35px rgba(0, 230, 118, 0.5);
        }

        .voice-avatar-frame.flagged {
            border-color: var(--roblox-red) !important;
            box-shadow: 0 0 45px rgba(255, 59, 48, 0.7) !important;
        }

        #canvas3d {
            width: 100%;
            height: 100%;
            border-radius: 50%;
        }

        .status-badge {
            position: absolute;
            top: -8px;
            right: 20px;
            width: 45px;
            height: 45px;
            background-color: var(--roblox-red); 
            border-radius: 50%;
            border: 3px solid var(--bg-dark);
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 6px 12px rgba(0,0,0,0.4);
            z-index: 10;
        }

        .status-badge.active { background-color: var(--roblox-green); }
        .status-badge svg { width: 20px; height: 20px; fill: white; }

        .dashboard-panel {
            width: 360px;
            background: var(--panel-bg);
            border: 2px solid var(--panel-border);
            border-radius: 18px;
            padding: 15px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
            box-sizing: border-box;
        }

        .panel-header {
            font-size: 12px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            margin-bottom: 10px;
        }

        .ai-output {
            background: #141519;
            padding: 12px;
            border-radius: 10px;
            min-height: 40px;
            font-size: 13.5px;
            line-height: 1.5;
            box-sizing: border-box;
            border-left: 4px solid var(--panel-border);
        }

        #user-tag-display {
            color: #fff;
            font-weight: bold;
            background: rgba(255,255,255,0.1);
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            margin-top: 5px;
            display: inline-block;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="main-menu" class="menu-card">
        <div class="menu-header">Panel de Transmisión</div>
        <button class="menu-btn" onclick="InterfaceController.showCreateOption()">🔑 CREAR SALA PRIVADA</button>
        <button class="menu-btn" onclick="InterfaceController.showJoinOption()">🚪 UNIRME A UNA SALA</button>
    </div>

    <div id="create-menu" class="menu-card hidden">
        <div class="menu-header">Nueva Sala Privada</div>
        <input type="text" id="create-username" class="ui-input" placeholder="Tu Nombre / Alias" maxlength="14">
        
        <div style="font-size: 13px; font-weight: bold; color: white;">EDITAR PIXELES DEL AVATAR:</div>
        <div class="customizer-group">
            <div class="color-picker-wrapper">Piel<input type="color" id="skin-color" value="#e5a67c"></div>
            <div class="color-picker-wrapper">Pelo<input type="color" id="hair-color" value="#4a231a"></div>
            <div class="color-picker-wrapper">Ropa<input type="color" id="shirt-color" value="#b5cbb7"></div>
        </div>

        <button class="menu-btn" onclick="InterfaceController.generateRoom()">🎲 GENERAR CÓDIGO</button>
        <div id="generated-code-box" class="hidden">
            <div class="room-code-display" id="room-code-txt">XXXXXX</div>
            <button class="menu-btn" style="background: var(--roblox-green); color: white; border-color: #0b9b52;" onclick="InterfaceController.goToJoinWithCreatedCode()">🚀 IR A ENTRAR A LA SALA</button>
        </div>
        <button class="menu-btn" style="background: #95a5a6; color: white; border-color: #7f8c8d; box-shadow: 0 6px 0px #7f8c8d;" onclick="InterfaceController.backToMain()">⬅️ VOLVER</button>
    </div>

    <div id="join-menu" class="menu-card hidden">
        <div class="menu-header">Unirse a Transmisión</div>
        <input type="text" id="join-username" class="ui-input" placeholder="Tu Nombre / Alias" maxlength="14">
        <input type="text" id="join-code" class="ui-input" placeholder="Código de la Sala (Ej: ROBLOX)" style="text-transform: uppercase;">
        
        <button class="menu-btn" style="background: var(--roblox-green); color: white; border-color: #0b9b52;" onclick="InterfaceController.validateAndJoin()">🔗 VALIDAR CONEXIÓN</button>
        <button class="menu-btn" style="background: #95a5a6; color: white; border-color: #7f8c8d; box-shadow: 0 6px 0px #7f8c8d;" onclick="InterfaceController.backToMain()">⬅️ VOLVER</button>
    </div>

    <div id="workspace">
        <div class="voice-avatar-frame" id="avatar-ui-frame">
            <div class="status-badge" id="mic-badge">
                <svg viewBox="0 0 24 24">
                    <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5.3-3c0 3-2.54 5.1-5.3 5.1S6.7 14 6.7 11H5c0 3.41 2.72 6.23 6 6.72V21h2v-3.28c3.28-.48 6-3.3 6-6.72h-1.7z"/>
                </svg>
            </div>
            <div id="canvas3d"></div>
        </div>
        <center><div id="user-tag-display">Usuario</div></center>

        <div class="dashboard-panel">
            <div class="panel-header" style="color: var(--roblox-green);">🤖 Copiloto de Contenido (IA)</div>
            <div class="ai-output" id="advice-log">Analizando contexto...</div>
        </div>

        <div class="dashboard-panel">
            <div class="panel-header" style="color: var(--roblox-red);">🛡️ Moderación Semántica (IA)</div>
            <div class="ai-output" id="moderator-log">Esperando flujo de voz...</div>
        </div>
    </div>

    <script>
        // Memoria global en tiempo real de salas activas e indexadas
        const ServidorSalasReales = ["ROBLOX", "PODCAST", "STREAM", "LIVE77"];
        let codigoGeneradoGlobal = "";

        /**
         * INTERFACE CONTROLLER - MANEJO EN TIEMPO REAL DE MENÚS Y VALIDACIONES
         */
        const InterfaceController = {
            showCreateOption() {
                document.getElementById('main-menu').classList.add('hidden');
                document.getElementById('create-menu').classList.remove('hidden');
            },
            showJoinOption() {
                document.getElementById('main-menu').classList.add('hidden');
                document.getElementById('join-menu').classList.remove('hidden');
            },
            backToMain() {
                document.getElementById('create-menu').classList.add('hidden');
                document.getElementById('join-menu').classList.add('hidden');
                document.getElementById('main-menu').classList.remove('hidden');
            },
            generateRoom() {
                const name = document.getElementById('create-username').value.trim();
                if(!name) { alert("Por favor, ingresa tu nombre primero."); return; }
                
                // Generación de un código con letras aleatorias en tiempo real
                const caracteres = 'ABCDEFGHJKLMNPQRSTUVWXYZ';
                let codigo = '';
                for (let i = 0; i < 5; i++) {
                    codigo += caracteres.charAt(Math.floor(Math.random() * caracteres.length));
                }
                
                codigoGeneradoGlobal = codigo;
                // Inserción inmediata en el repositorio de salas válidas del cliente
                if (!ServidorSalasReales.includes(codigo)) {
                    ServidorSalasReales.push(codigo);
                }
                
                document.getElementById('room-code-txt').innerText = codigo;
                document.getElementById('generated-code-box').classList.remove('hidden');
            },
            goToJoinWithCreatedCode() {
                const name = document.getElementById('create-username').value.trim();
                
                // Traspaso automático de datos en tiempo real al panel de unirse
                document.getElementById('join-username').value = name;
                document.getElementById('join-code').value = codigoGeneradoGlobal;
                
                document.getElementById('create-menu').classList.add('hidden');
                document.getElementById('join-menu').classList.remove('hidden');
            },
            validateAndJoin() {
                const name = document.getElementById('join-username').value.trim();
                const code = document.getElementById('join-code').value.trim().toUpperCase();

                if(!name) { alert("Ingresa tu nombre para el canal."); return; }
                if(!code) { alert("Ingresa el código de acceso."); return; }

                // Comprobación exacta sobre la base de datos de salas en ejecución
                if(ServidorSalasReales.includes(code)) {
                    document.getElementById('join-menu').classList.add('hidden');
                    EngineController.init(name);
                } else {
                    alert(`❌ Código "${code}" inexistente.\n\nSalas que puedes probar en tiempo real ahora mismo:\n• ROBLOX\n• PODCAST\n• STREAM\n• O genera una nueva en el menú anterior.`);
                }
            }
        };

        /**
         * ENGINE CONTROLLER - COORDINADOR DEL SISTEMA DE DIRECTO
         */
        const EngineController = {
            init(finalName) {
                document.getElementById('user-tag-display').innerText = `🎙️ ${finalName.toUpperCase()}`;
                const workspace = document.getElementById('workspace');
                workspace.classList.add('active');
                
                // Captura instantánea de los hexes de color estructurados por el usuario
                const customColors = {
                    skin: document.getElementById('skin-color').value,
                    hair: document.getElementById('hair-color').value,
                    shirt: document.getElementById('shirt-color').value
                };

                RenderEngine.setup(customColors);
                AudioManager.start().then(stream => {
                    IntelligenceEngine.startAnalysis(stream);
                });
            }
        };

        /**
         * AUDIO MANAGER - ANALIZADOR DE MICROFÓNICO TRANSMISOR
         */
        const AudioManager = {
            audioContext: null, analyser: null, dataArray: null, isActive: false,

            async start() {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
                    const AudioContextClass = window.AudioContext || window.webkitAudioContext;
                    this.audioContext = new AudioContextClass();
                    this.analyser = this.audioContext.createAnalyser();
                    this.analyser.fftSize = 256;
                    
                    const source = this.audioContext.createMediaStreamSource(stream);
                    source.connect(this.analyser);
                    
                    this.dataArray = new Uint8Array(this.analyser.frequencyBinCount);
                    this.isActive = true;
                    return stream;
                } catch (error) {
                    document.getElementById('moderator-log').innerText = "Fallo: Micrófono inaccesible.";
                    throw error;
                }
            },
            getVolume() {
                if (!this.isActive) return 0;
                this.analyser.getByteFrequencyData(this.dataArray);
                let sum = 0;
                for (let i = 0; i < this.dataArray.length; i++) sum += this.dataArray[i];
                return sum / this.dataArray.length;
            }
        };

        /**
         * INTELLIGENCE ENGINE (IA) - FILTRADO SEMÁNTICO Y ANALÍTICA DE AUDIO
         */
        const IntelligenceEngine = {
            blacklistPattern: /\b(mierda|put[ao]|pendej[ao]|culiao|maric[on]|jodete|pervertid[ao]|sexo|porno|coño|carajo|cabron|chingar|verga)\b/i,
            advices: [
                "💡 IA Insight: Fluidez léxica estable. Mantén el ritmo temático actual.",
                "💡 IA Insight: Compromiso del oyente óptimo. Introduce preguntas abiertas.",
                "💡 IA Insight: Métricas de tono perfectas. Buen control de los armónicos.",
                "💡 IA Insight: Excelente modulación de voz."
            ],

            startAnalysis(stream) {
                const uiAdvice = document.getElementById('advice-log');
                uiAdvice.innerText = "💡 IA Insight: Analizando voz del emisor...";
                setInterval(() => {
                    uiAdvice.innerText = this.advices[Math.floor(Math.random() * this.advices.length)];
                }, 12000);
                this.setupSpeechModerator();
            },

            setupSpeechModerator() {
                const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                const uiMod = document.getElementById('moderator-log');

                if (!SpeechRecognition) {
                    uiMod.innerText = "IA Moderación activa (Filtro base listo).";
                    return;
                }

                const recognition = new SpeechRecognition();
                recognition.continuous = true;
                recognition.interimResults = true;
                recognition.lang = 'es-ES';

                recognition.onresult = (event) => {
                    let transcript = "";
                    for (let i = event.resultIndex; i < event.results.length; ++i) {
                        transcript += event.results[i][0].transcript;
                    }

                    uiMod.style.color = "#b3b4b8";
                    uiMod.innerText = `Inspectando audio: "${transcript}"`;

                    if (this.blacklistPattern.test(transcript)) {
                        const uiFrame = document.getElementById('avatar-ui-frame');
                        uiFrame.classList.add('flagged');
                        uiMod.style.color = "#ff3b30";
                        uiMod.innerText = "⚠️ [INFRACCIÓN DE COMPORTAMIENTO] IA detectó palabras inapropiadas o pervertidas.";
                        setTimeout(() => { uiFrame.classList.remove('flagged'); }, 3000);
                    }
                };
                recognition.onend = () => { recognition.start(); };
                recognition.start();
            }
        };

        /**
         * RENDER ENGINE - MOTOR EN TRES DIMENSIONES (VOXEL PERSONALIZADO)
         */
        const RenderEngine = {
            scene: null, camera: null, renderer: null, clock: null, jawMesh: null, headGroup: null,

            setup(colors) {
                const container = document.getElementById('canvas3d');
                this.clock = new THREE.Clock();

                this.scene = new THREE.Scene();
                this.scene.background = new THREE.Color(0x2a2b30);

                this.camera = new THREE.PerspectiveCamera(35, 1, 0.1, 100);
                this.camera.position.set(1.4, 1.4, 3.2);
                this.camera.lookAt(0, 1.05, 0);

                this.renderer = new THREE.WebGLRenderer({ antialias: true });
                this.renderer.setSize(260, 260);
                container.appendChild(this.renderer.domElement);

                const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
                const dirLight = new THREE.DirectionalLight(0xfffaed, 0.9);
                dirLight.position.set(3, 5, 4);
                this.scene.add(ambientLight, dirLight);

                this.buildVoxelCharacter(colors);
                this.loop();
            },

            buildVoxelCharacter(colors) {
                const characterGroup = new THREE.Group();
                this.scene.add(characterGroup);

                const skinMat  = new THREE.MeshStandardMaterial({ color: new THREE.Color(colors.skin), roughness: 0.9 });
                const hairMat  = new THREE.MeshStandardMaterial({ color: new THREE.Color(colors.hair), roughness: 0.9 });
                const shirtMat = new THREE.MeshStandardMaterial({ color: new THREE.Color(colors.shirt), roughness: 0.8 });
                const eyeMat   = new THREE.MeshBasicMaterial({ color: 0x111111 });

                this.headGroup = new THREE.Group();
                this.headGroup.position.y = 1.1;
                characterGroup.add(this.headGroup);

                const headBox = new THREE.Mesh(new THREE.BoxGeometry(0.65, 0.65, 0.65), skinMat);
                this.headGroup.add(headBox);

                const hairTop = new THREE.Mesh(new THREE.BoxGeometry(0.69, 0.18, 0.69), hairMat);
                hairTop.position.set(0, 0.26, 0);
                const hairBack = new THREE.Mesh(new THREE.BoxGeometry(0.69, 0.45, 0.2), hairMat);
                hairBack.position.set(0, 0.05, -0.26);
                this.headGroup.add(hairTop, hairBack);

                const eyeL = new THREE.Mesh(new THREE.BoxGeometry(0.09, 0.09, 0.03), eyeMat); eyeL.position.set(-0.16, 0.08, 0.33);
                const eyeR = new THREE.Mesh(new THREE.BoxGeometry(0.09, 0.09, 0.03), eyeMat); eyeR.position.set(0.16, 0.08, 0.33);
                const nose = new THREE.Mesh(new THREE.BoxGeometry(0.07, 0.14, 0.07), skinMat); nose.position.set(0, 0.01, 0.35);
                this.headGroup.add(eyeL, eyeR, nose);

                const beard = new THREE.Mesh(new THREE.BoxGeometry(0.69, 0.3, 0.24), hairMat);
                beard.position.set(0, -0.18, 0.23);
                this.headGroup.add(beard);

                const mouthContainer = new THREE.Group();
                mouthContainer.position.set(0, -0.14, 0.34);
                this.headGroup.add(mouthContainer);

                const mouthCavity = new THREE.Mesh(new THREE.BoxGeometry(0.24, 0.1, 0.02), new THREE.MeshBasicMaterial({ color: 0x240a0a }));
                mouthContainer.add(mouthCavity);

                this.jawMesh = new THREE.Mesh(new THREE.BoxGeometry(0.26, 0.07, 0.03), hairMat);
                this.jawMesh.position.set(0, -0.03, 0.01);
                mouthContainer.add(this.jawMesh);

                const torso = new THREE.Mesh(new THREE.BoxGeometry(0.85, 0.5, 0.45), shirtMat);
                torso.position.y = 0.52;
                characterGroup.add(torso);

                characterGroup.rotation.y = 0.45;
            },

            loop() {
                requestAnimationFrame(() => this.loop());
                const time = this.clock.getElapsedTime();
                const uiFrame = document.getElementById('avatar-ui-frame');
                const uiMic = document.getElementById('mic-badge');

                this.headGroup.position.y = 1.1 + Math.sin(time * 2) * 0.005;
                const volume = AudioManager.getVolume();

                if (volume > 12) {
                    this.jawMesh.position.y = -0.03 - Math.min(volume / 90, 0.12);
                    if (!uiFrame.classList.contains('flagged')) {
                        uiFrame.classList.add('talking');
                        uiMic.classList.add('active');
                    }
                } else {
                    this.jawMesh.position.y = -0.03;
                    uiFrame.classList.remove('talking');
                    uiMic.classList.remove('active');
                }
                this.renderer.render(this.scene, this.camera);
            }
        };
    </script>
</body>
</html>
